name: k-splash
title: K-Splash
base: core24
version: "1.0"
summary: K-Splash Plasma wallpaper widget
license: MIT
contact: https://store.kde.org/
website: https://store.kde.org/

description: |
  K-Splash is a KDE Plasma widget that refreshes wallpaper images from Unsplash
  through a user-provided backend URL.

grade: stable
confinement: strict

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
  arm64:
    build-on: [arm64]
    build-for: [arm64]
  armhf:
    build-on: [armhf]
    build-for: [armhf]

plugs:
  dot-local-share-plasma-plasmoids:
    interface: personal-files
    write:
      - $HOME/.local/share/plasma/plasmoids

apps:
  install-widget:
    command: bin/install-k-splash
    plugs:
      - dot-local-share-plasma-plasmoids
      - desktop
      - desktop-legacy
      - x11
      - wayland

parts:
  k-splash:
    plugin: nil
    source: .
    override-build: |
      set -eu

      install -d "$CRAFT_PART_INSTALL/usr/share/plasma/plasmoids/K-Splash"
      cp -a metadata.json "$CRAFT_PART_INSTALL/usr/share/plasma/plasmoids/K-Splash/"
      cp -a contents "$CRAFT_PART_INSTALL/usr/share/plasma/plasmoids/K-Splash/"

      install -D -m 0755 snap/local/install-k-splash \
        "$CRAFT_PART_INSTALL/bin/install-k-splash"
